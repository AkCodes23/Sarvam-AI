# =============================================================================
# CURATED SOURCES — the highest-leverage file in this repo.
#
# RULE: listen to a sample of every candidate BEFORE trusting it. Reject anything
# with a second speaker, background music/beds, applause, phone-call audio, heavy
# reverb, or autotune. The quality gates + the human review app are the safety net;
# this list is the first filter (chosen by archetype + channel reputation).
#
# Selected for MULTIPLE distinct clean voices per language and spread across
# emotion/style (audiobooks/storytelling -> expressive/sad/happy; lectures/AIR/news
# -> neutral/formal; discourse -> calm). Compilation channels (music beds) excluded.
#
# Field notes: expected_speakers=1 skips diarization filtering for true solo
# sources; max_minutes caps audio (balance + credits); start_offset_s/end_trim_s
# skip intros/outros; license is best-effort (clips are short + transformative,
# used for research, with full provenance retained).
# =============================================================================

